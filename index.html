<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>결 매칭</title>

<style>
body {font-family:sans-serif; max-width:500px; margin:auto; padding:20px; background:#f5f5f5;}
.card {background:white; padding:15px; margin-top:10px; border-radius:10px;}
button {padding:10px; border:none; background:black; color:white; border-radius:8px;}
select,input,textarea {width:100%; margin-bottom:10px; padding:8px;}
</style>

</head>

<body>

<h2>결이 맞는 사람</h2>

<div id="onboard">

<input id="name" placeholder="이름">

<select id="purpose">
<option>편안함</option><option>성장</option><option>안정</option><option>자극</option>
</select>

<select id="emotion">
<option>즉시 표현</option><option>정리 후 표현</option><option>쌓아둠</option>
</select>

<select id="speed">
<option>빠름</option><option>천천히</option>
</select>

<select id="conflict">
<option>대화</option><option>회피</option><option>거리둠</option>
</select>

<select id="energy">
<option>안정형</option><option>파동형</option>
</select>

<select id="suffering">
<option>붙잡는다</option><option>이해한다</option><option>내려놓는다</option>
</select>

<textarea id="intro" placeholder="한 줄 소개"></textarea>

<button onclick="start()">시작</button>

</div>

<div id="menu" style="display:none">
<button onclick="explore()">추천 보기</button>
<button onclick="connections()">내 연결</button>
</div>

<div id="view"></div>

<script src="app.js"></script>

</body>
</html>
