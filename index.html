<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>결 매칭</title>
</head>

<body style="font-family:sans-serif; max-width:500px; margin:auto; padding:20px">

<h2>결이 맞는 사람 찾기</h2>

<div id="step1">

<input id="name" placeholder="이름" style="width:100%; padding:10px"><br><br>

<p>관계의 목적</p>
<select id="purpose">
<option>편안함</option>
<option>성장</option>
<option>안정</option>
<option>자극</option>
</select>

<p>감정 처리 방식</p>
<select id="emotion">
<option>즉시 표현</option>
<option>정리 후 표현</option>
<option>쌓아둠</option>
</select>

<p>관계 속도</p>
<select id="speed">
<option>빠름</option>
<option>천천히</option>
</select>

<p>갈등 방식</p>
<select id="conflict">
<option>대화</option>
<option>회피</option>
<option>거리둠</option>
</select>

<p>에너지</p>
<select id="energy">
<option>안정형</option>
<option>파동형</option>
</select>

<p>괴로움 처리</p>
<select id="suffering">
<option>붙잡는다</option>
<option>이해한다</option>
<option>내려놓는다</option>
</select>

<p>자기소개</p>
<textarea id="intro" style="width:100%"></textarea>

<br><br>
<button onclick="register()">시작하기</button>

</div>

<div id="menu" style="display:none">
<h3>메뉴</h3>
<button onclick="match()">매칭 보기</button>
<button onclick="loadMatches()">내 연결 보기</button>
</div>

<div id="result" style="display:none"></div>

<script src="app.js"></script>

</body>
</html>
